<!DOCTYPE html>
<html lang="en">
<head>
    <script>window.ENV_API_URL = "https://blc-invoice-api.onrender.com";</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BLC Invoice Portal — Login</title>
<meta name="description" content="Secure login for BLC Trainer Invoice & Payment Tracking Portal. Freelance trainers and administrators manage invoices and payments." />
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
<div class="login-bg">
  <div class="particles" id="particles"></div>

  <div class="login-card">
    <div class="login-logo" style="justify-content: center;">
      <img src="/assets/img/logo.png" alt="BLC Portal" style="height: 60px;" />
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access your invoice dashboard</p>

    <div id="alert-box" class="alert alert-error hidden"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-icon">
          <span class="icon">✉️</span>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password" />
          <button type="button" class="toggle-pw" id="toggle-pw" title="Show/hide password">👁️</button>
        </div>
      </div>
      <!-- Forgot password removed as requested -->
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
        Sign In
      </button>
    </form>

    <p style="margin-top:22px; font-size:0.78rem; color:var(--text-muted); text-align:center;">
      Don't have an account? Contact your BLC administrator.
    </p>
  </div>

  <p class="version-badge">BLC Invoice Portal v1.0 &nbsp;|&nbsp; Behave Like Compiler</p>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/login.js"></script>
</body>
</html>
