<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set New Password — BLC Portal</title>
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
<div class="login-bg">
  <div class="login-card" style="max-width: 400px;">
    <div class="login-logo">
      <img src="/assets/img/logo.png" alt="BLC Portal" style="height: 52px;" />
    </div>

    <h2>Set New Password</h2>
    <p class="subtitle" id="subtitle">Enter your new password below.</p>

    <div id="alert-box" class="alert hidden"></div>

    <form id="reset-form">
      <input type="hidden" id="token">
      <div class="form-group">
        <label>New Password</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="password" class="form-control" required minlength="8">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-top: 10px;">
        Reset Password
      </button>
    </form>

    <div style="text-align: center; margin-top: 20px; display: none;" id="login-link">
      <a href="/index.html" class="btn btn-ghost btn-sm">Go to Login</a>
    </div>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script>
  const rawToken = new URLSearchParams(window.location.search).get('token');

  if (!rawToken) {
    const alertBox = document.getElementById('alert-box');
    alertBox.className = 'alert alert-error';
    alertBox.textContent = 'Invalid or missing reset token.';
    document.getElementById('reset-form').style.display = 'none';
  } else {
    document.getElementById('token').value = rawToken;
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token    = document.getElementById('token').value;
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');
    const alertBox = document.getElementById('alert-box');

    btn.disabled = true;

    try {
      const res = await apiFetch('/auth/reset-password', {
        method: 'POST', body: JSON.stringify({ token, password })
      });
      alertBox.className = 'alert alert-success';
      alertBox.textContent = res.message;
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('subtitle').style.display = 'none';
      document.getElementById('login-link').style.display = 'block';
    } catch (err) {
      alertBox.className = 'alert alert-error';
      alertBox.textContent = err.message || 'An error occurred';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
