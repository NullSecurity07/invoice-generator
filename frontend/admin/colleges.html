<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Colleges — BLC Admin</title>
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="/assets/img/logo.png" alt="BLC Portal" style="width: 80%; max-width: 180px;" />
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Management</div>
        <a href="/admin/dashboard.html" class="nav-item">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
        <a href="/admin/invoices.html" class="nav-item">
          <span class="nav-icon">📄</span>
          <span>All Invoices</span>
        </a>
        <a href="/admin/users.html" class="nav-item">
          <span class="nav-icon">👥</span>
          <span>Trainers</span>
        </a>
        <a href="/admin/colleges.html" class="nav-item active">
          <span class="nav-icon">🏢</span>
          <span>Colleges</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar admin-badge" id="sidebar-avatar">A</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-user-name">Admin</div>
        <div class="user-role" id="sidebar-user-role">admin</div>
      </div>
      <button class="logout-btn" title="Logout" data-action="logout">⏻</button>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <h1 class="topbar-title">Manage Colleges / Clients</h1>
    </header>

    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <h3>College Directory</h3>
        </div>
        <div class="card-body">
          <p class="text-muted mb-4" style="font-size: 0.875rem;">
            Add colleges and clients here. Trainers can only select from this list when creating invoices.
          </p>

          <form id="add-college-form" class="add-college-form">
            <input type="text" id="new_college_name" class="form-control"
              placeholder="Enter college or client name..." required minlength="2">
            <button type="submit" class="btn btn-primary">Add College</button>
          </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>College / Client Name</th>
                  <th>Added On</th>
                  <th width="100">Actions</th>
                </tr>
              </thead>
              <tbody id="colleges-body">
                <tr><td colspan="3" class="text-center text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

</div>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/pages/admin-colleges.js"></script>
</body>
</html>
