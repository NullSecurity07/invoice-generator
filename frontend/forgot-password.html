<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — BLC Portal</title>
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
<div class="login-bg">
  <div class="login-card" style="max-width: 400px;">
    <div class="login-logo">
      <img src="/assets/img/logo.png" alt="BLC Portal" style="height: 52px;" />
    </div>

    <h2>Reset Password</h2>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <div id="alert-box" class="alert hidden"></div>

    <form id="forgot-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <span class="icon">✉️</span>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-top: 10px;">
        Send Reset Link
      </button>
    </form>

    <p style="text-align: center; margin-top: 24px; font-size: 0.875rem;">
      <a href="/index.html">← Back to login</a>
    </p>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script>
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email  = document.getElementById('email').value;
    const btn    = document.getElementById('submit-btn');
    const alertBox = document.getElementById('alert-box');

    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      const res = await apiFetch('/auth/forgot-password', {
        method: 'POST', body: JSON.stringify({ email })
      });
      alertBox.className = 'alert alert-info';
      alertBox.textContent = res.message;
      document.getElementById('forgot-form').reset();
    } catch (err) {
      alertBox.className = 'alert alert-error';
      alertBox.textContent = err.message || 'An error occurred';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  });
</script>
</body>
</html>
